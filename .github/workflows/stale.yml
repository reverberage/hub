name: Stale issues and PRs

on:
  schedule:
    - cron: "0 9 * * 1"  # Monday 09:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          # Issues
          days-before-stale: 45
          days-before-close: 15
          stale-issue-label: "stale"
          stale-issue-message: >
            This issue has been inactive for 45 days. It will be closed in 15 days
            if no further activity occurs. Comment to keep it open.
          close-issue-message: >
            Closed due to inactivity. Reopen if still relevant.
          exempt-issue-labels: "priority:high,epic,area:infrastructure"

          # PRs
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: "stale"
          stale-pr-message: >
            This PR has been inactive for 30 days. It will be closed in 7 days
            if no further activity occurs.
          close-pr-message: >
            Closed due to inactivity. Reopen if still relevant.
          exempt-pr-labels: "priority:high"

          # Global
          operations-per-run: 50
          remove-stale-when-updated: true
