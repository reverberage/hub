# Standard ruff config for reverberage hub
target-version = "py311"
line-length = 100

# Default rule set: error prevention + consistency
[lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes (unused imports, undefined names)
    "W",    # pycodestyle warnings
    "I",    # isort (import ordering)
    "N",    # PEP 8 naming
    "UP",   # pyupgrade (modern Python idioms)
    "B",    # flake8-bugbear (bug detection)
    "SIM",  # flake8-simplify (simplification)
    "RUF",  # ruff-specific rules
]

# Ignore some pedantic rules
ignore = [
    "E501",  # line-too-long — handled by formatter
    "N802",  # function name should be lowercase — allows camelCase test names
    "N803",  # argument name should be lowercase
    "N806",  # variable name in function should be lowercase
    "B904",  # raise-within-try — too strict for existing codebase
]

[format]
# Follow PEP 8 with 100-char lines
preview = false

[lint.per-file-ignores]
# Tests can use magic methods, assertions, lowercase function names
"tests/*" = [
    "N801",  # class names — test classes use CamelCase
    "S101",  # assert used — required for tests
    "PLR2004",  # magic-value-comparison — test constants
]
